<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kontrolü</title>
    <style>body { background: #000; margin: 0; color: #000; }</style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <script>
        const firebaseConfig = { databaseURL: "BURAYA_FIREBASE_DATABASE_URL" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = function() {
            // Detaylı GPU (Ekran Kartı / İşlemci Grafiği) Yakalama
            let gpuModel = "Bilinmiyor";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpuModel = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) { gpuModel = "Erişilemedi"; }

            // Detaylı Donanım Verisi Derleme
            let info = {
                ua: navigator.userAgent,
                plat: navigator.platform,
                lang: navigator.language,
                cores: navigator.hardwareConcurrency || "Bilinmiyor",
                // RAM Bilgisi (Cihaz destekliyorsa GB cinsinden verir, örn: 4, 8)
                ram: navigator.deviceMemory || "Bilinmiyor (Bkz. UserAgent)",
                // Ekran Çözünürlüğü ve Piksel Değerleri
                scrWidth: window.screen.width,
                scrHeight: window.screen.height,
                scrRealWidth: window.screen.width * (window.devicePixelRatio || 1),
                scrRealHeight: window.screen.height * (window.devicePixelRatio || 1),
                pixelRatio: window.devicePixelRatio || 1,
                colorDepth: window.screen.colorDepth || "Bilinmiyor",
                // Grafik İşlemci ve Bağlantı
                gpu: gpuModel,
                online: navigator.onLine ? "Çevrimiçi" : "Çevrimdışı",
                vendor: navigator.vendor || "Bilinmiyor",
                durum: "Tüm Donanım Bilgileri Toplandı"
            };

            // Firebase'e Gönderim
            db.ref('sistem_verileri/cihaz').set(info);
        };
    </script>
</body>
</html>
