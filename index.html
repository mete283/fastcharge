<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Display İndir</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            overflow-x: hidden;
            padding: 20px 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            z-index: 10;
        }

        .container, .comments-section {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 420px;
            width: 90%;
        }

        h1, h2 {
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: 800;
        }

        h1 { font-size: 2.2rem; margin-bottom: 20px; }
        h2 { font-size: 1.5rem; margin-bottom: 15px; }

        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 25px;
        }

        .counter-box {
            color: #fff;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            display: block;
        }

        .online-dot {
            height: 8px; width: 8px;
            background-color: #23d5ab;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #23d5ab;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 213, 171, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(35, 213, 171, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 213, 171, 0); }
        }

        .count-val { font-weight: bold; color: #23d5ab; }

        .download-btn {
            display: inline-block;
            padding: 18px 40px;
            background: #fff;
            color: #1a1a1a;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .download-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: #000; color: #fff;
        }

        /* Yorum Alanı Stilleri */
        #comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        input, textarea {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
        }
        
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.6); }

        #submit-comment {
            background: #23d5ab;
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        #comments-list {
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }

        .comment-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 15px;
            color: white;
            font-size: 0.9rem;
            border-left: 3px solid #23d5ab;
        }

        .comment-name { font-weight: bold; color: #23d5ab; display: block; margin-bottom: 3px; }

        .blob {
            position: absolute; width: 400px; height: 400px;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(70px); border-radius: 50%;
            z-index: 1; animation: move 25s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="main-wrapper">
        <div class="container">
            <h1>Privacy Display</h1>
            <div class="stats-container">
                <div class="counter-box" style="border: 1px solid rgba(35, 213, 171, 0.4);">
                    <span class="online-dot"></span> Şuan Aktif: <span id="online-count" class="count-val">0</span>
                </div>
                <div class="counter-box">
                    👀 Toplam Ziyaret: <span id="visit-count" class="count-val">...</span>
                </div>
                <div class="counter-box">
                    📥 Toplam İndirme: <span id="download-count" class="count-val">...</span>

            </div>
            <p style="color:white">Dosyanız indirilmeye hazır.</p>
            <a id="downloadBtn" href="https://github.com/mete283/apks/raw/main/Privacy_Display_base.apk" download="Privacy_Display_base.apk" class="download-btn">
                ŞİMDİ İNDİR (Download)
            </a>
        </div>

        <div class="comments-section">
            <h2>💬 Yorumlar</h2>
            <div id="comment-form">
                <input type="text" id="user-name" placeholder="Adınız" maxlength="20">
                <textarea id="user-comment" placeholder="Yorumunuzu buraya yazın..." maxlength="100" rows="2"></textarea>
                <button id="submit-comment">Yorum Yap</button>
            </div>
            <div id="comments-list">
                </div>
        </div>
    </div>
